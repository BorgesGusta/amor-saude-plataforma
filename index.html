<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Entrar · Amor Saúde</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#2BAFBE; --teal-deep:#1C7E8C; --teal-ink:#0F4A52;
    --coral:#E2483C;
    --ink:#1B2624; --ink-soft:#5C6B67;
    --paper:#FBFAF7; --mist:#EEF5F4; --line:#DCE3E1;
    --red-bg:#FCEBEB; --red-tx:#A32D2D;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
    background:var(--paper); color:var(--ink); font-family:'Inter',sans-serif; padding:24px;
  }
  .card{
    width:100%; max-width:380px; background:#fff; border:1px solid var(--line);
    border-radius:20px; padding:36px 32px;
  }
  .logo{height:34px; width:auto; display:block; margin:0 auto 22px;}
  h1{
    font-family:'Plus Jakarta Sans',sans-serif; font-size:22px; font-weight:700;
    text-align:center; margin:0 0 4px; color:var(--ink);
  }
  .sub{text-align:center; font-size:13.5px; color:var(--ink-soft); margin:0 0 28px;}
  label{display:block; font-size:13px; font-weight:600; margin-bottom:7px; color:var(--ink);}
  .field{margin-bottom:16px;}
  input{
    width:100%; border:1.5px solid var(--line); border-radius:10px; padding:12px 14px;
    font-size:15px; font-family:'Inter',sans-serif; color:var(--ink); background:var(--paper);
  }
  input:focus{outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(43,175,190,0.14);}
  button{
    width:100%; margin-top:8px; background:var(--teal-deep); color:#fff; border:none;
    border-radius:10px; padding:14px; font-size:15px; font-weight:600; font-family:'Inter',sans-serif;
    cursor:pointer;
  }
  button:hover{background:var(--teal);}
  button:disabled{opacity:0.6; cursor:wait;}
  .error{
    background:var(--red-bg); color:var(--red-tx); font-size:13px; padding:10px 12px;
    border-radius:8px; margin-top:14px; display:none;
  }
</style>
</head>
<body>
<div class="card">
  <img src="assets/logo_amor_saude.png" alt="Amor Saúde" class="logo" />
  <h1>Entrar</h1>
  <p class="sub">Acesso à plataforma de atendimento</p>

  <div class="field">
    <label for="username">Usuário</label>
    <input type="text" id="username" autocomplete="username" />
  </div>
  <div class="field">
    <label for="senha">Senha</label>
    <input type="password" id="senha" autocomplete="current-password" />
  </div>
  <button id="loginBtn">Entrar</button>
  <div class="error" id="errorMsg" role="alert"></div>
</div>

<script>
  const LOGIN_URL = 'https://n8n.growuprastreamento.com.br/webhook/login';
  const btn = document.getElementById('loginBtn');
  const errorMsg = document.getElementById('errorMsg');

  const ROTAS = {
    recepcao: 'checkin-recepcao.html',
    gestora: 'painel-gestora.html',
    admin_growup: 'painel-growup.html'
  };

  async function tentarLogin() {
    const username = document.getElementById('username').value.trim();
    const senha = document.getElementById('senha').value;
    errorMsg.style.display = 'none';

    if (!username || !senha) {
      errorMsg.textContent = 'Preencha usuário e senha.';
      errorMsg.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Entrando…';

    try {
      const res = await fetch(LOGIN_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, senha })
      });
      const data = await res.json();

      if (data.success) {
        sessionStorage.setItem('amorSaudeSession', JSON.stringify(data));
        window.location.href = ROTAS[data.role] || 'login.html';
      } else {
        errorMsg.textContent = data.erro || 'Usuário ou senha incorretos.';
        errorMsg.style.display = 'block';
      }
    } catch (err) {
      errorMsg.textContent = 'Não foi possível conectar. Tente novamente.';
      errorMsg.style.display = 'block';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Entrar';
    }
  }

  btn.addEventListener('click', tentarLogin);
  document.getElementById('senha').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') tentarLogin();
  });
</script>
</body>
</html>
