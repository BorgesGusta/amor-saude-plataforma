<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Confirmar cupom · Amor Saúde</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#2BAFBE; --teal-deep:#1C7E8C; --teal-ink:#0F4A52;
    --coral:#E2483C; --mist-coral:#FCEEEB;
    --ink:#1B2624; --ink-soft:#5C6B67;
    --paper:#FBFAF7; --surface:#FFFFFF; --mist:#EEF5F4; --line:#DCE3E1;
    --radius:20px;
    --ok-bg:#E1F5EE; --ok-tx:#085041;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper); color:var(--ink); font-family:'Inter',sans-serif;
    min-height:100vh; padding:24px;
  }
  .card{
    width:100%; max-width:560px; margin:0 auto; background:var(--surface); border:1px solid var(--line);
    border-radius:var(--radius); padding:32px 28px;
  }
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; gap:12px; flex-wrap:wrap;}
  .logo{height:26px; width:auto;}
  .logout{
    font-size:12.5px; color:var(--ink-soft); background:none; border:1px solid var(--line);
    border-radius:10px; padding:7px 12px; cursor:pointer; font-family:'Inter',sans-serif;
    display:flex; align-items:center; gap:6px;
  }
  .logout:hover{border-color:var(--coral); color:var(--coral);}
  .eyebrow{font-size:13px; color:var(--teal-ink); font-weight:600; margin-bottom:6px;}
  h1{font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:24px; margin:0 0 6px; color:var(--ink);}
  .sub{color:var(--ink-soft); font-size:14px; margin:0 0 18px; line-height:1.5;}
  .nav-link{
    font-size:12.5px; font-weight:600; color:var(--teal-deep); text-decoration:none;
    display:inline-flex; align-items:center; gap:4px; margin-bottom:20px;
  }
  input[type="text"]{
    width:100%; border:1.5px solid var(--line); border-radius:12px; padding:13px 16px;
    font-size:15px; font-family:'Inter',sans-serif; color:var(--ink); background:var(--paper);
    margin-bottom:14px;
  }
  input[type="text"]:focus{outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(43,175,190,0.14);}
  .filtros{display:flex; gap:8px; margin-bottom:18px; flex-wrap:wrap;}
  .filtro-btn{
    border:1px solid var(--line); background:#fff; border-radius:999px; padding:7px 14px;
    font-size:12.5px; font-weight:500; cursor:pointer; color:var(--ink-soft); font-family:'Inter',sans-serif;
  }
  .filtro-btn.active{background:var(--teal-deep); color:#fff; border-color:var(--teal-deep);}
  .lista{display:flex; flex-direction:column; gap:10px;}
  .item{
    border:1px solid var(--line); border-radius:14px; padding:14px 16px;
    display:flex; align-items:center; gap:12px;
  }
  .item.resgatado{background:var(--mist); border-color:var(--teal);}
  .item-info{flex:1; min-width:0;}
  .item-nome{font-size:14.5px; font-weight:600; color:var(--ink); margin:0 0 2px;}
  .item-meta{font-size:12.5px; color:var(--ink-soft); margin:0; line-height:1.5;}
  .item-badge{font-size:11px; font-weight:600; padding:3px 9px; border-radius:999px; white-space:nowrap; flex-shrink:0;}
  .item-badge.ok{background:var(--ok-bg); color:var(--ok-tx);}
  .confirmar-btn{
    background:var(--teal-deep); color:#fff; border:none; border-radius:10px; padding:9px 14px;
    font-size:12.5px; font-weight:600; cursor:pointer; font-family:'Inter',sans-serif; white-space:nowrap; flex-shrink:0;
  }
  .confirmar-btn:hover{background:var(--teal);}
  .vazio{text-align:center; padding:32px 12px; color:var(--ink-soft); font-size:13.5px;}
</style>
</head>
<body>

<div class="card">

  <div class="topbar">
    <img src="assets/logo_amor_saude.png" alt="Amor Saúde" class="logo" />
    <button class="logout" id="logoutBtn">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Sair
    </button>
  </div>

  <p class="eyebrow" id="nomeExibicao">Recepção</p>
  <h1>Confirmar cupom</h1>
  <p class="sub">Busque pelo nome ou telefone do paciente para confirmar que a oferta enviada por WhatsApp foi utilizada.</p>

  <a href="checkin-recepcao.html" class="nav-link">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M11 6l-6 6 6 6" stroke="var(--teal-deep)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Voltar para novo check-in
  </a>

  <input type="text" id="buscaInput" placeholder="Nome ou telefone do paciente..." autocomplete="off"/>

  <div class="filtros" id="filtros">
    <button class="filtro-btn active" onclick="setFiltro(this,'pendentes')">Pendentes</button>
    <button class="filtro-btn" onclick="setFiltro(this,'confirmados')">Confirmados</button>
    <button class="filtro-btn" onclick="setFiltro(this,'todos')">Todos</button>
  </div>

  <div class="lista" id="lista">
    <div class="vazio">Carregando...</div>
  </div>

</div>

<script>
  const SUPABASE_URL = 'https://owvwtcnetzzdsjsndmwd.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_BVC7UDZrDMiaNLuk8EXJTQ_az6SZh2i';

  const session = JSON.parse(sessionStorage.getItem('amorSaudeSession') || 'null');
  if (!session || session.role !== 'recepcao') {
    window.location.href = 'index.html';
  }
  document.getElementById('nomeExibicao').textContent = session.nome_exibicao || 'Recepção';
  document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('amorSaudeSession');
    window.location.href = 'index.html';
  });

  async function sbFetch(path, opts = {}) {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
      ...opts,
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${SUPABASE_KEY}`,
        'Content-Type': 'application/json',
        'Prefer': 'return=representation',
        ...(opts.headers || {})
      }
    });
    if (!res.ok) throw new Error(await res.text());
    const text = await res.text();
    return text ? JSON.parse(text) : [];
  }

  let registros = [];
  let filtroAtual = 'pendentes';

  function formatarTelefone(tel){
    const d = (tel || '').replace(/\D/g,'').replace(/^55/,'');
    if(d.length === 11) return `(${d.slice(0,2)}) ${d.slice(2,7)}-${d.slice(7)}`;
    if(d.length === 10) return `(${d.slice(0,2)}) ${d.slice(2,6)}-${d.slice(6)}`;
    return tel || '';
  }

  function formatarData(iso){
    const d = new Date(iso);
    return d.toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit' }) + ' às ' + d.toLocaleTimeString('pt-BR', { hour:'2-digit', minute:'2-digit' });
  }

  async function carregarRegistros(){
    const lista = document.getElementById('lista');
    try {
      const agora = new Date();
      const inicio = new Date(agora);
      inicio.setDate(agora.getDate() - 30);

      registros = await sbFetch(`disparo_logs?clinic_id=eq.amor_saude&status=eq.enviado&criado_em=gte.${inicio.toISOString()}&select=id,template_nome,especialidade,telefone,criado_em,resgatado,resgatado_em,checkin_id,checkins(nome)&order=criado_em.desc&limit=200`);
      renderLista();
    } catch(e) {
      lista.innerHTML = `<div class="vazio" style="color:var(--coral);">Erro ao carregar: ${e.message}</div>`;
    }
  }

  function setFiltro(btn, tipo){
    filtroAtual = tipo;
    document.querySelectorAll('#filtros .filtro-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderLista();
  }

  function renderLista(){
    const lista = document.getElementById('lista');
    const termo = document.getElementById('buscaInput').value.trim().toLowerCase();

    let filtrados = registros.filter(r => {
      if(filtroAtual === 'pendentes' && r.resgatado) return false;
      if(filtroAtual === 'confirmados' && !r.resgatado) return false;
      if(termo){
        const nome = (r.checkins?.nome || '').toLowerCase();
        const tel = (r.telefone || '').toLowerCase();
        if(!nome.includes(termo) && !tel.includes(termo)) return false;
      }
      return true;
    });

    if(filtrados.length === 0){
      lista.innerHTML = `<div class="vazio">${termo ? 'Nenhum resultado para essa busca.' : 'Nada por aqui ainda.'}</div>`;
      return;
    }

    lista.innerHTML = filtrados.map(r => {
      const nome = r.checkins?.nome || 'Paciente';
      const templateHumano = r.template_nome.replace(/_/g,' ').replace(/\b\w/g, l => l.toUpperCase());
      return `
        <div class="item ${r.resgatado ? 'resgatado' : ''}">
          <div class="item-info">
            <p class="item-nome">${nome}</p>
            <p class="item-meta">${formatarTelefone(r.telefone)} · ${templateHumano}</p>
            <p class="item-meta">${r.resgatado ? 'Confirmado em ' + formatarData(r.resgatado_em) : 'Enviado em ' + formatarData(r.criado_em)}</p>
          </div>
          ${r.resgatado
            ? `<span class="item-badge ok">✓ usado</span>`
            : `<button class="confirmar-btn" onclick="confirmarResgate('${r.id}')">Confirmar uso</button>`
          }
        </div>
      `;
    }).join('');
  }

  async function confirmarResgate(id){
    try {
      await sbFetch(`disparo_logs?id=eq.${id}`, {
        method: 'PATCH',
        body: JSON.stringify({
          resgatado: true,
          resgatado_em: new Date().toISOString(),
          resgatado_por: session.nome_exibicao || 'Recepção'
        })
      });
      await carregarRegistros();
    } catch(e) {
      alert('Erro ao confirmar: ' + e.message);
    }
  }

  document.getElementById('buscaInput').addEventListener('input', renderLista);

  carregarRegistros();
</script>
</body>
</html>
