<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
<title>Check-in · Amor Saúde</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --teal:#2BAFBE; --teal-deep:#1C7E8C; --teal-ink:#0F4A52;
    --coral:#E2483C; --mist-coral:#FCEEEB;
    --ink:#1B2624; --ink-soft:#5C6B67;
    --paper:#FBFAF7; --surface:#FFFFFF; --mist:#EEF5F4; --line:#DCE3E1;
    --radius:20px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper); color:var(--ink); font-family:'Inter',sans-serif;
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px;
  }
  .card{
    width:100%; max-width:480px; background:var(--surface); border:1px solid var(--line);
    border-radius:var(--radius); padding:36px 32px; position:relative; overflow:hidden;
  }
  .topbar{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
  .logo{height:26px; width:auto;}
  .logout{font-size:12.5px; color:var(--ink-soft); background:none; border:none; cursor:pointer; font-family:'Inter',sans-serif;}
  .logout:hover{color:var(--coral);}
  .eyebrow{font-size:13px; letter-spacing:0.02em; color:var(--teal-ink); font-weight:600; margin-bottom:8px;}
  h1{font-family:'Plus Jakarta Sans',sans-serif; font-weight:700; font-size:30px; line-height:1.1; margin:0 0 6px; color:var(--ink);}
  .sub{color:var(--ink-soft); font-size:14.5px; margin:0 0 26px; line-height:1.5;}
  label{display:block; font-size:13px; font-weight:600; color:var(--ink); margin-bottom:8px;}
  .field{margin-bottom:22px;}
  input[type="tel"]{
    width:100%; border:1.5px solid var(--line); border-radius:12px; padding:14px 16px;
    font-size:17px; font-family:'Inter',sans-serif; color:var(--ink); background:var(--paper);
  }
  input[type="tel"]:focus{outline:none; border-color:var(--teal); box-shadow:0 0 0 3px rgba(43,175,190,0.14);}
  .chips{display:flex; gap:10px; flex-wrap:wrap;}
  .chip{
    border:1.5px solid var(--line); background:var(--paper); color:var(--ink);
    border-radius:999px; padding:11px 18px; font-size:14.5px; font-weight:500;
    cursor:pointer; font-family:'Inter',sans-serif;
  }
  .chip:hover{border-color:var(--teal);}
  .chip[aria-pressed="true"]{background:var(--teal-deep); border-color:var(--teal-deep); color:#fff;}
  button.submit{
    width:100%; margin-top:8px; background:var(--teal-deep); color:#fff; border:none;
    border-radius:12px; padding:16px; font-size:16px; font-weight:600; font-family:'Inter',sans-serif; cursor:pointer;
  }
  button.submit:hover{background:var(--teal);}
  button.submit:disabled{opacity:0.6; cursor:wait;}
  .error{color:var(--coral); font-size:13.5px; margin-top:12px; display:none;}
  .confirm{display:none; text-align:center; padding:8px 0 4px;}
  .confirm.show{display:block;}
  .form-view.hide{display:none;}
  .check-circle{
    width:60px; height:60px; border-radius:50%; background:var(--mist-coral);
    display:flex; align-items:center; justify-content:center; margin:0 auto 18px;
  }
  .check-circle svg{width:30px; height:30px;}
  .confirm h2{font-family:'Plus Jakarta Sans',sans-serif; font-size:22px; font-weight:700; margin:0 0 6px;}
  .confirm p{color:var(--ink-soft); font-size:14.5px; margin:0;}
  .step{
    display:flex; align-items:center; gap:12px; margin-top:18px; padding:14px 16px;
    border-radius:12px; background:var(--paper); border:1px solid var(--line);
    opacity:0; transform:translateY(6px); transition:opacity .4s ease, transform .4s ease; text-align:left;
  }
  .step.in{opacity:1; transform:translateY(0);}
  .step .dot{width:30px; height:30px; border-radius:50%; flex-shrink:0; display:flex; align-items:center; justify-content:center;}
  .step .dot svg{width:15px; height:15px;}
  .step span{font-size:14px; font-weight:500; color:var(--ink);}
  .step small{display:block; font-size:12px; color:var(--ink-soft); font-weight:400; margin-top:1px;}
  .reset{
    margin-top:24px; background:none; border:1.5px solid var(--line); color:var(--ink);
    border-radius:12px; padding:13px 20px; width:100%; font-size:14.5px; font-weight:600;
    font-family:'Inter',sans-serif; cursor:pointer;
  }
  .reset:hover{border-color:var(--teal);}
  @media (prefers-reduced-motion: reduce){*{transition:none !important;}}
</style>
</head>

    <button class="logout" id="logoutBtn">Sair</button>
  </div>

  <div class="form-view" id="formView">
    <p class="eyebrow" id="nomeExibicao">Recepção</p>
    <h1>Check-in</h1>
    <p class="sub">Registre o paciente para liberar a oferta personalizada durante a espera.</p>

    <div class="field">
      <label for="telefone">WhatsApp do paciente</label>
      <input type="tel" id="telefone" placeholder="(94) 98193-9666" autocomplete="off" />
    </div>

    <div class="field">
      <label>Especialidade da consulta</label>
      <div class="chips" id="chips" role="group" aria-label="Especialidade"></div>
    </div>

    <button type="button" class="submit" id="submitBtn">Confirmar check-in</button>
    <div class="error" id="errorMsg" role="alert"></div>
  </div>

  <div class="confirm" id="confirmView">
    <div class="check-circle">
      <svg viewBox="0 0 24 24" fill="none"><path d="M12 21s-7-4.4-9.3-8.8C1.2 9 2.6 5.5 6 4.6c2-.5 3.7.3 5 1.9C12.3 4.9 14 4.1 16 4.6c3.4.9 4.8 4.4 3.3 7.6C16.9 16.6 12 21 12 21z" fill="var(--coral)"/><path d="M8.5 12.2l2.2 2.2 4.2-4.6" stroke="#fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <h2>Check-in registrado</h2>
    <p>O paciente já está na jornada de espera.</p>

    <div class="step" id="stepWrite">
      <div class="dot" style="background:var(--teal);">
        <svg viewBox="0 0 24 24" fill="none"><path d="M4 7h16M4 12h16M4 17h10" stroke="white" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <div><span>Atendimento salvo</span><small>Histórico do paciente atualizado</small></div>
    </div>

    <div class="step" id="stepWpp">
      <div class="dot" style="background:var(--coral);">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2a10 10 0 0 0-8.5 15.2L2 22l5-1.4A10 10 0 1 0 12 2z" stroke="white" stroke-width="1.8" stroke-linejoin="round"/></svg>
      </div>
      <div><span>Oferta enviada no WhatsApp</span><small>Mensagem personalizada para a especialidade</small></div>
    </div>

    <button class="reset" id="resetBtn">Novo check-in</button>
  </div>

</div>

<script>
  const WEBHOOK_URL = 'https://n8n.growuprastreamento.com.br/webhook/checkin';

  const session = JSON.parse(sessionStorage.getItem('amorSaudeSession') || 'null');
  if (!session || session.role !== 'recepcao') {
    window.location.href = 'index.html';
  }

  document.getElementById('nomeExibicao').textContent = session.nome_exibicao || 'Recepção';
  document.getElementById('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('amorSaudeSession');
    window.location.href = 'index.html';
  });

  const especialidades = session.especialidades_permitidas || [];
  const chipsContainer = document.getElementById('chips');
  let selected = null;

  especialidades.forEach((esp, i) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'chip';
    btn.dataset.value = esp;
    btn.setAttribute('aria-pressed', 'false');
    btn.textContent = esp.charAt(0).toUpperCase() + esp.slice(1);
    btn.addEventListener('click', () => {
      document.querySelectorAll('.chip').forEach(c => c.setAttribute('aria-pressed', 'false'));
      btn.setAttribute('aria-pressed', 'true');
      selected = esp;
    });
    chipsContainer.appendChild(btn);
  });

  const telefoneInput = document.getElementById('telefone');
  telefoneInput.addEventListener('input', (e) => {
    let v = e.target.value.replace(/\D/g,'').slice(0,11);
    if (v.length > 6) v = `(${v.slice(0,2)}) ${v.slice(2,7)}-${v.slice(7)}`;
    else if (v.length > 2) v = `({v.slice(0,2)}) ${v.slice(2)}`;
    e.target.value = v;
  });

  const submitBtn = document.getElementById('submitBtn');
  const errorMsg = document.getElementById('errorMsg');
  const formView = document.getElementById('formView');
  const confirmView = document.getElementById('confirmView');
  const stepWrite = document.getElementById('stepWrite');
  const stepWpp = document.getElementById('stepWpp');
  const resetBtn = document.getElementById('resetBtn');

  submitBtn.addEventListener('click', async () => {
    errorMsg.style.display = 'none';
    const digits = telefoneInput.value.replace(/\D/g,'');

    if (digits.length < 10) {
      errorMsg.textContent = 'Confirme o número com DDD antes de continuar.';
      errorMsg.style.display = 'block';
      return;
    }
    if (!selected) {
      errorMsg.textContent = 'Selecione a especialidade da consulta.';
      errorMsg.style.display = 'block';
      return;
    }

    const telefone = '55' + digits;
    submitBtn.disabled = true;
    submitBtn.textContent = 'Registrando…';

    try {
      await fetch(WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ telefone, especialidade: selected })
      });

      formView.classList.add('hide');
      confirmView.classList.add('show');
      setTimeout(() => stepWrite.classList.add('in'), 150);
      setTimeout(() => stepWpp.classList.add('in'), 900);

    } catch (err) {
      errorMsg.textContent = 'Não foi possível registrar agora. Confira a conexão e tente novamente.';
      errorMsg.style.display = 'block';
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Confirmar check-in';
    }
  });

  resetBtn.addEventListener('click', () => {
    telefoneInput.value = '';
    document.querySelectorAll('.chip').forEach(c => c.setAttribute('aria-pressed','false'));
    selected = null;
    stepWrite.classList.remove('in');
    stepWpp.classList.remove('in');
    confirmView.classList.remove('show');
    formView.classList.remove('hide');
  });
</script>

</body>
</html>
